plugins {
    id "org.springframework.boot" version "3.5.7"
    id "io.spring.dependency-management" version "1.1.7"
    id "java"
    id "jacoco"
}

group = 'com.encircle360.oss.straightmail'
version '0.5.0'

java {
    sourceCompatibility = JavaVersion.VERSION_21
    targetCompatibility = JavaVersion.VERSION_21
}

repositories {
    mavenLocal()
    mavenCentral()
}

dependencies {
    implementation 'org.springframework.boot:spring-boot-starter-web'
    implementation 'org.springframework.boot:spring-boot-starter-oauth2-resource-server'
    implementation 'org.springframework.boot:spring-boot-starter-mail'
    implementation 'org.springframework.boot:spring-boot-starter-freemarker'
    implementation 'org.springframework.boot:spring-boot-starter-actuator'
    implementation 'org.springframework.boot:spring-boot-starter-validation'
    implementation 'org.springframework.boot:spring-boot-starter-data-jpa'
    runtimeOnly 'org.postgresql:postgresql'
    runtimeOnly 'org.xerial:sqlite-jdbc:3.49.1.0'
    implementation 'org.hibernate.orm:hibernate-community-dialects:6.6.50.Final'
    implementation 'org.liquibase:liquibase-core'

    // jsoup for cleaning html mail to text
    implementation group: 'org.jsoup', name: 'jsoup', version: '1.21.1'

    // lombok & mapstruct
    compileOnly "org.projectlombok:lombok:1.18.38"
    annotationProcessor 'org.projectlombok:lombok:1.18.38'
    testCompileOnly 'org.projectlombok:lombok:1.18.38'
    testAnnotationProcessor 'org.projectlombok:lombok:1.18.38'

    implementation 'org.mapstruct:mapstruct:1.6.3'
    annotationProcessor 'org.mapstruct:mapstruct-processor:1.6.3'
    testAnnotationProcessor "org.mapstruct:mapstruct-processor:1.6.3"

    // Testcontainers for integration testing (MailHog)
    testImplementation 'org.testcontainers:testcontainers:2.0.5'
    testImplementation 'org.testcontainers:testcontainers-junit-jupiter:2.0.5'

    implementation 'com.fasterxml.jackson.datatype:jackson-datatype-jsr310'

    // OpenAPI documentation - compatible with Spring Boot 3.5.x
    implementation 'org.springdoc:springdoc-openapi-starter-webmvc-ui:2.8.17'

    // JGit for Git template sync
    implementation 'org.eclipse.jgit:org.eclipse.jgit:7.3.0.202506031305-r'

    // ShedLock for distributed scheduling (HA-safe git-sync)
    implementation 'net.javacrumbs.shedlock:shedlock-spring:6.10.0'
    implementation 'net.javacrumbs.shedlock:shedlock-provider-jdbc-template:6.10.0'

    // Observability: Micrometer tracing with OpenTelemetry bridge and OTLP exporter
    implementation 'io.micrometer:micrometer-tracing-bridge-otel'
    implementation 'io.opentelemetry:opentelemetry-exporter-otlp'

    testImplementation('org.springframework.boot:spring-boot-starter-test')
}

test {
    useJUnitPlatform()
    // Enable Mockito inline mock maker for JDK 21+ compatibility
    jvmArgs '-XX:+EnableDynamicAgentLoading'
}

jar {
    enabled = false
}

def skipFrontendBuild = System.getenv("SKIP_FRONTEND_BUILD")?.trim()?.equalsIgnoreCase("true") == true ||
        project.findProperty("skipFrontendBuild")?.toString()?.trim()?.equalsIgnoreCase("true") == true
def frontendDir = file("${projectDir}/../frontend")
def frontendDist = file("${frontendDir}/dist/browser")
def staticDir = file("${projectDir}/src/main/resources/static")

if (!skipFrontendBuild) {
    tasks.register('npmInstall', Exec) {
        workingDir frontendDir
        commandLine 'sh', '-c', 'npm ci'
        inputs.file("${frontendDir}/package-lock.json")
        outputs.dir("${frontendDir}/node_modules")
    }

    tasks.register('npmBuild', Exec) {
        dependsOn 'npmInstall'
        workingDir frontendDir
        commandLine 'sh', '-c', 'npm run build'
        inputs.dir("${frontendDir}/src")
        inputs.file("${frontendDir}/angular.json")
        outputs.dir(frontendDist)
    }

    tasks.register('copyFrontendDist', Copy) {
        dependsOn 'npmBuild'
        from frontendDist
        into staticDir
    }

    processResources.dependsOn 'copyFrontendDist'
}

clean {
    delete staticDir
}
