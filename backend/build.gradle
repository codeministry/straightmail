plugins {
    id "org.springframework.boot" version "4.0.6"
    id "io.spring.dependency-management" version "1.1.7"
    id "java"
    id "jacoco"
}

group = 'com.encircle360.oss.straightmail'
version '0.5.0'

java {
    sourceCompatibility = JavaVersion.VERSION_21
    targetCompatibility = JavaVersion.VERSION_21
}

repositories {
    mavenLocal()
    mavenCentral()
}

dependencies {
    implementation 'org.springframework.boot:spring-boot-starter-web'
    implementation 'org.springframework.boot:spring-boot-starter-oauth2-resource-server'
    implementation 'org.springframework.boot:spring-boot-starter-mail'
    implementation 'org.springframework.boot:spring-boot-starter-freemarker'
    implementation 'org.springframework.boot:spring-boot-starter-actuator'
    implementation 'org.springframework.boot:spring-boot-starter-validation'
    implementation 'org.springframework.boot:spring-boot-starter-data-jpa'
    runtimeOnly 'org.postgresql:postgresql'
    runtimeOnly 'org.xerial:sqlite-jdbc:3.49.1.0'
    implementation 'org.hibernate.orm:hibernate-community-dialects:7.2.12.Final'
    implementation 'org.liquibase:liquibase-core'
    // Spring Boot 4 modularization: Liquibase auto-configuration extracted into its own module
    implementation 'org.springframework.boot:spring-boot-liquibase'

    // jsoup for cleaning html mail to text
    implementation group: 'org.jsoup', name: 'jsoup', version: '1.22.2'

    // lombok & mapstruct
    compileOnly "org.projectlombok:lombok:1.18.46"
    annotationProcessor 'org.projectlombok:lombok:1.18.46'
    testCompileOnly 'org.projectlombok:lombok:1.18.46'
    testAnnotationProcessor 'org.projectlombok:lombok:1.18.46'

    implementation 'org.mapstruct:mapstruct:1.6.3'
    annotationProcessor 'org.mapstruct:mapstruct-processor:1.6.3'
    testAnnotationProcessor "org.mapstruct:mapstruct-processor:1.6.3"

    // Testcontainers for integration testing (MailHog)
    testImplementation 'org.testcontainers:testcontainers:2.0.5'
    testImplementation 'org.testcontainers:testcontainers-junit-jupiter:2.0.5'

    // Jackson 3 (Spring Boot 4): java.time support is built-in, no separate jsr310 module needed.

    // OpenAPI documentation - compatible with Spring Boot 4.x (Jackson 3)
    implementation 'org.springdoc:springdoc-openapi-starter-webmvc-ui:3.0.3'

    // JGit for Git template sync
    implementation 'org.eclipse.jgit:org.eclipse.jgit:7.6.0.202603022253-r'

    // ShedLock for distributed scheduling (HA-safe git-sync)
    implementation 'net.javacrumbs.shedlock:shedlock-spring:7.7.0'
    implementation 'net.javacrumbs.shedlock:shedlock-provider-jdbc-template:7.7.0'

    // Observability: Micrometer tracing with OpenTelemetry bridge and OTLP exporter
    implementation 'io.micrometer:micrometer-tracing-bridge-otel'
    implementation 'io.opentelemetry:opentelemetry-exporter-otlp'

    testImplementation('org.springframework.boot:spring-boot-starter-test')
    // Spring Boot 4 modularization: MockMvc / WebMvc test slice extracted into its own starter
    testImplementation 'org.springframework.boot:spring-boot-starter-webmvc-test'
}

test {
    useJUnitPlatform()
    // Enable Mockito inline mock maker for JDK 21+ compatibility
    jvmArgs '-XX:+EnableDynamicAgentLoading'
}

jar {
    enabled = false
}

def skipFrontendBuild = System.getenv("SKIP_FRONTEND_BUILD")?.trim()?.equalsIgnoreCase("true") == true ||
        project.findProperty("skipFrontendBuild")?.toString()?.trim()?.equalsIgnoreCase("true") == true
def frontendDir = file("${projectDir}/../frontend")
def frontendDist = file("${frontendDir}/dist/browser")
def staticDir = file("${projectDir}/src/main/resources/static")

if (!skipFrontendBuild) {
    tasks.register('npmInstall', Exec) {
        workingDir frontendDir
        commandLine 'sh', '-c', 'npm ci'
        inputs.file("${frontendDir}/package-lock.json")
        outputs.dir("${frontendDir}/node_modules")
    }

    tasks.register('npmBuild', Exec) {
        dependsOn 'npmInstall'
        workingDir frontendDir
        commandLine 'sh', '-c', 'npm run build'
        inputs.dir("${frontendDir}/src")
        inputs.file("${frontendDir}/angular.json")
        outputs.dir(frontendDist)
    }

    tasks.register('copyFrontendDist', Copy) {
        dependsOn 'npmBuild'
        from frontendDist
        into staticDir
    }

    processResources.dependsOn 'copyFrontendDist'
}

clean {
    delete staticDir
}
