name: CI

on:
  push:
    branches: [master]
    tags: ['v*.*.*']
  pull_request:
    branches: [master]

# Cancel superseded runs on the same branch / PR to save runner time
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

# Least-privilege defaults: only what the job actually needs
permissions:
  contents: read

jobs:
  build:
    name: Build & test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build & test
        run: ./gradlew --no-daemon build

      - name: Upload bootJar
        uses: actions/upload-artifact@v4
        with:
          name: straightmail-jar
          path: build/libs/*.jar
          if-no-files-found: error
          retention-days: 7
