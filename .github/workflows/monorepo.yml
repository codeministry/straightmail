name: Monorepo Full Build

on:
  push:
    branches: [ "main" ]

permissions:
  contents: read
  packages: write

jobs:
  backend:
    name: Backend Build & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Setup Node.js (for Angular build)
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Full build (backend + Angular frontend)
        run: ./gradlew build -x test

      - name: Run tests
        run: ./gradlew test
        env:
          SKIP_FRONTEND_BUILD: "true"

      - name: Upload combined JAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: combined-jar
          path: backend/build/libs/*.jar
          retention-days: 7

  frontend:
    name: Client Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run Unit Tests
        run: npm test -- --no-watch

  docker-combined:
    name: Build & Push Combined Image
    runs-on: ubuntu-latest
    needs: [ backend, frontend ]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download combined JAR
        uses: actions/download-artifact@v4
        with:
          name: combined-jar
          path: backend/build/libs/

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64,amd64

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Convert repository name to lowercase
        id: repo
        run: echo "repo_lowercase=$(echo ${{ github.repository }} | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ steps.repo.outputs.repo_lowercase }}/backend
          tags: |
            type=raw,value=latest
            type=sha,prefix=,format=short

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=registry,ref=ghcr.io/${{ steps.repo.outputs.repo_lowercase }}/backend:buildcache
          cache-to: type=registry,ref=ghcr.io/${{ steps.repo.outputs.repo_lowercase }}/backend:buildcache,mode=max
