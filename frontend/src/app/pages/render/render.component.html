<app-page-header icon="preview" title="render.title"/>

<!-- Mobile-only tab switcher (hidden on desktop via CSS) -->
<div class="render-mobile-tabs">
  <button
    (click)="mobilePanelTab.set('form')"
    [class.active]="mobilePanelTab() === 'form'"
    class="render-mobile-tab"
    type="button"
  >
    <i class="bi bi-sliders me-1"></i>{{ 'render.tab_form' | translate }}
  </button>
  <button
    (click)="mobilePanelTab.set('preview')"
    [class.active]="mobilePanelTab() === 'preview'"
    class="render-mobile-tab"
    type="button"
  >
    <i class="bi bi-eye me-1"></i>{{ 'render.tab_preview' | translate }}
  </button>
</div>

<div class="render-layout">

  <!-- ── Left: Form ──────────────────────────────────────────────────────────── -->
  <div [class.render-panel--hidden]="mobilePanelTab() === 'preview'" class="render-form-panel">
    <form (ngSubmit)="submit()" [formGroup]="form" novalidate>

      <div class="mb-3">
        <app-select-field
          [control]="form.get('templateId')"
          [required]="true"
          icon="bi bi-file-earmark-text"
          label="render.template_id"
        >
          <option value="">— Select template —</option>
          @for (t of groupedTemplates().nonGit; track t.id) {
            <option [value]="t.id">{{ t.name }}@if (t.locale) {
              ({{ t.locale }})
            }</option>
          }
          @for (group of groupedTemplates().gitGroups; track group.branch) {
            <optgroup [label]="'⎇ ' + group.branch">
              @for (t of group.templates; track t.id + '|' + t.gitBranch) {
                <option [value]="t.id">{{ t.name }}@if (t.locale) {
                  ({{ t.locale }})
                }</option>
              }
            </optgroup>
          }
        </app-select-field>
      </div>

      <div class="mb-4">
        <app-json-model-field
          [control]="form.get('model')"
          [rows]="8"
          icon="bi bi-braces"
          label="render.model"
          placeholder="render.model_placeholder"
        />
      </div>

      <div class="d-flex gap-2">
        <app-loading-button
          [loading]="loading()"
          icon="bi-eye"
          label="render.submit"
          loadingLabel="render.rendering"
        />
        @if (result()) {
          <button (click)="clear()" class="btn btn-outline-secondary" type="button">
            <i class="bi bi-x-circle me-1"></i>{{ 'common.cancel' | translate }}
          </button>
        }
      </div>

    </form>
  </div>

  <!-- ── Right: Preview ─────────────────────────────────────────────────────── -->
  <app-render-preview
    [class.render-panel--hidden]="mobilePanelTab() === 'form'"
    [error]="error()"
    [html]="sanitizedHtml()"
    [plain]="result()?.plain ?? null"
  />

</div>
