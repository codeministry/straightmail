@switch (icon()) {
  @case ('dashboard') {
    <svg fill="currentColor" height="1em" viewBox="0 0 14 14" width="1em">
      <rect height="5" rx="1" width="5" x="1" y="1"/>
      <rect height="5" rx="1" width="5" x="8" y="1"/>
      <rect height="5" rx="1" width="5" x="1" y="8"/>
      <rect height="5" rx="1" width="5" x="8" y="8"/>
    </svg>
  }
  @case ('send') {
    <svg
      fill="none"
      height="1em"
      stroke="currentColor"
      stroke-linecap="round"
      stroke-linejoin="round"
      stroke-width="1.5"
      viewBox="0 0 14 14"
      width="1em"
    >
      <path d="M12.5 1.5L8.5 12.5 6.5 7.5 1.5 5.5z"/>
    </svg>
  }
  @case ('preview') {
    <svg
      fill="none"
      height="1em"
      stroke="currentColor"
      stroke-linecap="round"
      stroke-linejoin="round"
      stroke-width="1.5"
      viewBox="0 0 14 14"
      width="1em"
    >
      <path d="M1 7s2.2-4.5 6-4.5S13 7 13 7s-2.2 4.5-6 4.5S1 7 1 7z"/>
      <circle cx="7" cy="7" r="1.75"/>
    </svg>
  }
  @case ('templates') {
    <i class="bi bi-grid-3x3-gap"></i>
  }
  @case ('building') {
    <i class="bi bi-building"></i>
  }
  @case ('edit') {
    <i class="bi bi-pencil"></i>
  }
}
